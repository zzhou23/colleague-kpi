services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-apr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apr}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./server
    environment:
      APR_DATABASE_URL: postgresql://${POSTGRES_USER:-apr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-apr}
      APR_SECRET_KEY: ${APR_SECRET_KEY:?Set APR_SECRET_KEY in .env}
      APR_CORS_ORIGINS: '["http://localhost"]'
      APR_UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
